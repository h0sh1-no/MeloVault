services:
  postgres:
    image: postgres:16-alpine
    container_name: melovault-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-melovault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-melovault}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ${MELOVAULT_IMAGE:-melovault:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: melovault
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - STATIC_DIR=/app/web
    ports:
      - "0.0.0.0:${PORT:-5000}:5000"
    volumes:
      - ./cookie.txt:/app/cookie.txt
      - downloads_data:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  downloads_data:
